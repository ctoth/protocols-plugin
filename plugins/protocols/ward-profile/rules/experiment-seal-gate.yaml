when: >
  session.phase == "experiment-worker"
  && !("experiment-harness-change" in session.signals)
  && tool in ["Edit", "Write"]
  && "file_path" in input
  && ["tests", "test", "eval", "bench", "benchmarks"].exists(d,
       input.file_path.contains("/" + d + "/")
       || input.file_path.contains("\\" + d + "\\")
       || input.file_path.startsWith(d + "/")
       || input.file_path.startsWith(d + "\\"))
action: deny
message: "Experiment protocol active: the evaluator is sealed. The worker may not modify tests, benchmark harnesses, evaluator scripts, or gold data mid-experiment — the thing being optimized cannot edit the thing doing the measuring. Harness fixes are separate infrastructure work committed BEFORE preregistration. Legitimate override (e.g. adding a new fast contract the prereg names): run `ward allow experiment-harness-change` — note this unseals the evaluator for the REST OF THE SESSION, so prefer pre-branch infrastructure commits."
